<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple CRUD App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

form {
    display: grid;
    gap: 10px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, button {
    padding: 10px;
    font-size: 16px;
}

button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

.actions button {
    margin: 2px;
}

@media(max-width:600px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }

    tr {
        margin-bottom: 10px;
        background: white;
        padding: 10px;
    }

    th {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>CRUD App (Google Sheets)</h2>

    <form id="form">
        <input type="hidden" id="id">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="phone" placeholder="Phone" required>
        <button type="submit">Save</button>
    </form>

    <table id="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxw_MLUypfsjPDvNWFZFsIVecp8hWgW1gEgUQ4Z3HAHaF1jZz9jnWOIRdxiUUcM-8-0/exec";

// Load data
async function loadData() {
    let res = await fetch(API_URL);
    let data = await res.json();

    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    data.slice(1).forEach(row => {
        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
            <td class="actions">
                <button onclick="edit('${row[0]}','${row[1]}','${row[2]}','${row[3]}')">Edit</button>
                <button onclick="remove('${row[0]}')">Delete</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// Save (Create / Update)
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;

    let action = id ? "update" : "create";

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action, id, name, email, phone })
    });

    this.reset();
    loadData();
});

// Edit
function edit(id, name, email, phone) {
    document.getElementById("id").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
    document.getElementById("phone").value = phone;
}

// Delete
async function remove(id) {
    if (!confirm("Delete this record?")) return;

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "delete", id })
    });

    loadData();
}

// Initial load
loadData();
</script>

</body>
</html>
